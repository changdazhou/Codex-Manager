services:
  codexmanager:
    build:
      context: ..
      dockerfile: docker/Dockerfile.all-in-one
      args:
        HTTPS_PROXY: "http://agent.baidu.com:8891"
        HTTP_PROXY: "http://agent.baidu.com:8891"
        https_proxy: "http://agent.baidu.com:8891"
        http_proxy: "http://agent.baidu.com:8891"
    container_name: codexmanager_test
    restart: unless-stopped
    network_mode: host
    environment:
      CODEXMANAGER_SERVICE_ADDR: 0.0.0.0:48760
      CODEXMANAGER_WEB_ADDR: 0.0.0.0:8761
      CODEXMANAGER_WEB_NO_OPEN: "1"
      TZ: ${TZ:-Asia/Shanghai}
      CODEXMANAGER_DB_PATH: /data/codexmanager.db
      CODEXMANAGER_RPC_TOKEN_FILE: /data/codexmanager.rpc-token
      CODEXMANAGER_GATEWAY_TRACE_STDOUT: "1"
      CODEXMANAGER_GATEWAY_ERROR_STDOUT: "1"
      CODEXMANAGER_USE_WEBSOCKET_UPSTREAM: "1"
      CODEXMANAGER_UPSTREAM_PROXY_URL: http://agent.baidu.com:8891
      CODEXMANAGER_UPSTREAM_CONNECT_TIMEOUT_SECS: "30"
      CODEXMANAGER_REQUEST_GATE_WAIT_TIMEOUT_MS: "5000"
      HTTPS_PROXY: http://agent.baidu.com:8891
      https_proxy: http://agent.baidu.com:8891
    volumes:
      - codexmanager-data:/data

volumes:
  codexmanager-data:
